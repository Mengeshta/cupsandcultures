<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Hand holding teacup with steam - simplified SVG representation -->
  
  <!-- Hand/Arm -->
  <path d="M120 250 Q140 240 160 245 Q180 250 190 260 Q200 270 195 285 Q190 300 175 305 Q160 310 140 305 Q120 300 115 285 Q110 270 120 250 Z" 
        fill="#8B7355" opacity="0.9"/>
  
  <!-- Arm extended -->
  <path d="M80 280 Q100 275 120 280" stroke="#8B7355" stroke-width="25" fill="none" stroke-linecap="round"/>
  
  <!-- Teacup -->
  <path d="M160 220 C160 200 240 200 240 220 C240 245 160 245 160 220 Z" 
        fill="#D2691E" stroke="#A0522D" stroke-width="2"/>
  
  <!-- Cup handle -->
  <path d="M240 215 C255 213 260 225 260 235 C260 245 250 253 240 250" 
        stroke="#D2691E" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Tea inside cup -->
  <ellipse cx="200" cy="215" rx="38" ry="6" fill="#4A4A4A" opacity="0.7"/>
  
  <!-- Steam -->
  <g stroke="#E0E0E0" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8">
    <path d="M185 200 C183 185 187 175 183 160 C179 145 185 135 183 120">
      <animate attributeName="d" 
               values="M185 200 C183 185 187 175 183 160 C179 145 185 135 183 120;
                       M185 200 C187 185 183 175 187 160 C191 145 185 135 187 120;
                       M185 200 C183 185 187 175 183 160 C179 145 185 135 183 120"
               dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M200 202 C198 190 202 180 198 168 C194 156 200 146 198 135">
      <animate attributeName="d"
               values="M200 202 C198 190 202 180 198 168 C194 156 200 146 198 135;
                       M200 202 C202 190 198 180 202 168 C206 156 200 146 202 135;
                       M200 202 C198 190 202 180 198 168 C194 156 200 146 198 135"
               dur="3.5s" repeatCount="indefinite"/>
    </path>
    <path d="M215 200 C213 188 217 178 213 165 C209 152 215 140 213 128">
      <animate attributeName="d"
               values="M215 200 C213 188 217 178 213 165 C209 152 215 140 213 128;
                       M215 200 C217 188 213 178 217 165 C221 152 215 140 217 128;
                       M215 200 C213 188 217 178 213 165 C209 152 215 140 213 128"
               dur="4s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Subtle glow around cup -->
  <ellipse cx="200" cy="220" rx="50" ry="45" fill="none" stroke="#DAA520" stroke-width="1" opacity="0.3"/>
</svg>
